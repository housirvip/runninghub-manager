services:
  runninghub-manager:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: ./backend/.env
        required: false
    container_name: runninghub-manager
    restart: unless-stopped
    ports:
      - "3060:3060"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./output:/app/output
    environment:
      - PORT=:3060
      - DB_DRIVER=sqlite
      - DB_PATH=/app/data/runninghub.db
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/output
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3060/api/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
